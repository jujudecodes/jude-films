<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jude Films</title>
    <!-- Lien vers votre feuille de style dans le dossier assets -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <!-- SECTION LOADER (S'efface une fois la page chargée) -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- CONTENU PRINCIPAL DE VOTRE SITE -->
    <main id="main-content">
        <h1>Jude Films</h1>
        <p>Bienvenue sur le site officiel de Jude Films. Contenu en cours de chargement...</p>
    </main>

    <!-- SCRIPT DU LOADER -->
    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            // Ajoute une transition fluide pour faire disparaître le loader
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.5s ease';
            
            // Masque complètement le loader après la transition
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        });
    </script>
</body>
</html>
